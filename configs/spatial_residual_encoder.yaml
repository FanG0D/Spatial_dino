# Spatial Residual Encoder Configuration
# Only learns spatial-aware residual features (no reconstruction)

ckpt_path: null

model:
  base_learning_rate: 1.0e-04
  target: ldm.models.spatial_residual_encoder.SpatialResidualEncoder
  params:
    image_key: "image"
    monitor: "val/loss"

    # DINOv3 Configuration (Frozen Semantic Encoder)
    dinov3_config:
      model_name: "dinov3_vits16plus"
      weights_path: null  # Set to path of dinov3 weights

    # DUSt3R Configuration (Frozen Spatial Teacher)
    dust3r_config:
      model_path: null  # Set to path of dust3r weights

    # Residual Encoder Configuration (Trainable)
    residual_config:
      output_dim: 8
      patch_size: 16
      img_size: 256
      num_layers: 6
      num_heads: 8
      hidden_dim: 384
      mlp_dim: 1536
      dropout: 0.1

    # Spatial Forcing Alignment Configuration
    align_config:
      target_dim: 768        # DUSt3R feature dimension
      hidden_dim: 1536       # 2 * target_dim
      use_norm: true
      loss_type: "cosine"    # cosine, mse, l1
      loss_coeff: 0.5        # Weight for alignment loss

    # Loss Configuration (simplified, only alignment)
    lossconfig:
      target: ldm.modules.losses.spatial_forcing_loss.SpatialForcingLoss
      params:
        align_loss_type: "cosine"

data:
  target: main_residual_encoder.DataModuleFromConfig
  params:
    batch_size: 64
    num_workers: 4
    train:
      target: ldm.data.airsim_dataset.AirSimTrain
      params:
        data_root: /mnt/disk_4/deyi/ANWM/data/airvln_16
        size: 256
    validation:
      target: ldm.data.airsim_dataset.AirSimValidation
      params:
        data_root: /mnt/disk_4/deyi/ANWM/data/airvln_16
        size: 256

lightning:
  trainer:
    accelerator: gpu
    devices: 8
    num_nodes: 1
    strategy: ddp
    max_epochs: 1000
    precision: 16-mixed
    accumulate_grad_batches: 1

  callbacks:
    model_checkpoint:
      target: pytorch_lightning.callbacks.ModelCheckpoint
      params:
        dirpath: "checkpoints/"
        filename: "{epoch:06}"
        save_last: True
        save_top_k: 3
        monitor: "val/loss"
        mode: "min"

logger:
  target: pytorch_lightning.loggers.TensorBoardLogger
  params:
    save_dir: "logs/"
    name: "spatial_residual_encoder"
